<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi người tớ thương</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Nền đen mặc định cho 3D */
            font-family: 'Dancing Script', cursive;
        }

        /* MÀN HÌNH 1: GIAO DIỆN BẮT ĐẦU */
        #screen1 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe6fa 0%, #ffd1eb 100%);
            z-index: 10;
            transition: opacity 1s ease-in-out;
        }

        .heart-1 {
            width: 120px;
            filter: drop-shadow(0px 10px 15px rgba(255, 20, 147, 0.4));
            animation: beat 1.2s infinite ease-in-out;
            cursor: pointer;
        }

        .start-text {
            font-size: 2.8rem;
            color: #d81b60;
            margin-top: 20px;
            cursor: pointer;
            user-select: none;
        }

        @keyframes beat {
            0%, 30%, 60%, 100% { transform: scale(1); }
            15%, 45% { transform: scale(1.15); }
        }

        /* MÀN HÌNH 2: TRÁI TIM 3D */
        #screen2 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* Ẩn lúc đầu */
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div id="screen1" onclick="startLove()">
        <img src="/img/anh 2.png" alt="Heart" class="heart-1">
        <div class="start-text">Bắt đầu</div>
    </div>

    <div id="screen2"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

    <script>
        // Hàm chuyển màn hình
        function startLove() {
            const s1 = document.getElementById('screen1');
            const s2 = document.getElementById('screen2');
            
            s1.style.opacity = '0';
            setTimeout(() => {
                s1.style.display = 'none';
                s2.style.display = 'block';
                init3DHeart(); // Khởi tạo trái tim 3D sau khi chuyển màn
            }, 1000);
        }

        // PHẦN XỬ LÝ 3D (THREE.JS)
        function init3DHeart() {
            let scene = new THREE.Scene();
            let camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 45;

            let renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('screen2').appendChild(renderer.domElement);

            let mainGroup = new THREE.Group();
            scene.add(mainGroup);

            // 1. Tạo trái tim từ các hạt (Particles)
            const heartVertices = [];
            const heartCount = 30000; // Số lượng hạt tạo thành trái tim
            for (let i = 0; i < heartCount; i++) {
                let t = Math.random() * Math.PI * 2;
                // Công thức hình trái tim 3D
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                let z = (Math.random() - 0.5) * 15; // Tạo độ dày 3D
                
                // Thu nhỏ kích thước lại một chút
                heartVertices.push(x * 0.8, y * 0.8, z);
            }

            const heartGeometry = new THREE.BufferGeometry();
            heartGeometry.setAttribute('position', new THREE.Float32BufferAttribute(heartVertices, 3));
            const heartMaterial = new THREE.PointsMaterial({ 
                color: 0xff4d6d, 
                size: 0.1, 
                transparent: true, 
                blending: THREE.AdditiveBlending 
            });
            const heartPoints = new THREE.Points(heartGeometry, heartMaterial);
            heartPoints.rotation.x = 0; // Lật ngược lại cho đúng chiều
            mainGroup.add(heartPoints);

            // 2. Tạo vòng xoay phía dưới
            const ringVertices = [];
            for (let i = 0; i < 4000; i++) {
                let angle = Math.random() * Math.PI * 2;
                let r = 18 + Math.random() * 6;
                let x = r * Math.cos(angle);
                let z = r * Math.sin(angle);
                let y = (Math.random() - 0.5) * 3;
                ringVertices.push(x, y - 20, z); // Đặt ở dưới thấp
            }
            const ringGeometry = new THREE.BufferGeometry();
            ringGeometry.setAttribute('position', new THREE.Float32BufferAttribute(ringVertices, 3));
            const ringMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true });
            const ringPoints = new THREE.Points(ringGeometry, ringMaterial);
            mainGroup.add(ringPoints);

            // Xử lý di chuyển chuột/chạm
            let mouseX = 0, mouseY = 0;
            window.addEventListener('pointermove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            function animate() {
                requestAnimationFrame(animate);
                heartPoints.rotation.y += 0.005;
                ringPoints.rotation.y -= 0.002;
                
                // Xoay dựa theo chuột
                mainGroup.rotation.y += (mouseX * 0.5 - mainGroup.rotation.y) * 0.05;
                mainGroup.rotation.x += (mouseY * 0.5 - mainGroup.rotation.x) * 0.05;

                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
</html>
